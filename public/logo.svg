<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="50%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#0d6ebd"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
  </defs>
  <!-- Eagle/Bird Logo -->
  <g transform="translate(10, 2)">
    <!-- Left wing - outer -->
    <path d="M30 45 Q10 30 5 10 Q15 20 25 15 Q20 25 30 20 Q25 30 30 25 Q30 35 30 45Z" fill="url(#wingGrad)" opacity="0.9"/>
    <!-- Left wing - inner feather -->
    <path d="M32 40 Q18 28 12 12 Q20 22 28 18 Q24 28 32 24 Q30 32 32 40Z" fill="url(#wingGrad)" opacity="0.7"/>
    <!-- Right wing - outer -->
    <path d="M30 45 Q50 30 55 10 Q45 20 35 15 Q40 25 30 20 Q35 30 30 25 Q30 35 30 45Z" fill="url(#wingGrad)" opacity="0.9"/>
    <!-- Right wing - inner feather -->
    <path d="M28 40 Q42 28 48 12 Q40 22 32 18 Q36 28 28 24 Q30 32 28 40Z" fill="url(#wingGrad)" opacity="0.7"/>
    <!-- Body -->
    <path d="M30 15 Q25 20 24 30 Q24 40 30 50 Q36 40 36 30 Q35 20 30 15Z" fill="url(#bodyGrad)"/>
    <!-- Head -->
    <circle cx="30" cy="13" r="4" fill="#0a2540"/>
    <!-- Beak -->
    <path d="M34 13 L40 14 L34 15Z" fill="#0d6ebd"/>
    <!-- Eye -->
    <circle cx="31" cy="12" r="1" fill="white"/>
  </g>
  <!-- AIRWARD text -->
  <text x="75" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#0a2540" letter-spacing="3">AIRWARD</text>
  <!-- INTERNATIONAL text -->
  <text x="75" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a4a7a" letter-spacing="6">INTERNATIONAL</text>
  <!-- Tagline line -->
  <line x1="75" y1="50" x2="195" y2="50" stroke="#c9a84c" stroke-width="0.5"/>
</svg>
